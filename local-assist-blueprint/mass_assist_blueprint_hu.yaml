blueprint:
  domain: automation
  name: Music Assistant - Helyi (kizĂĄrĂłlag) hangvezĂŠrlĂŠs terv
  source_url: https://github.com/music-assistant/voice-support/blob/main/local-assist-blueprint/mass_assist_blueprint_hu.yaml
  description: ' ![KĂŠp](https://github.com/music-assistant/voice-support/blob/main/assets/music-assistant.png?raw=true)

    # Zene lejĂĄtszĂĄsa hangparancsokkal

    ### BeĂĄllĂ­tĂĄs

    #### KĂśtelezĹ

    * ĂllĂ­tson be egy `AlapĂŠrtelmezett lejĂĄtszĂłt`, amelyet akkor hasznĂĄl a rendszer, ha
    a kĂŠrĂŠsben nem szerepel cĂŠleszkĂśz, ĂŠs a kĂŠrĂŠs nem olyan terĂźletrĹl ĂŠrkezik, ahol
    Music Assistant lejĂĄtszĂł talĂĄlhatĂł.

    #### OpcionĂĄlis

    * MĂłdosĂ­tsa az aktivĂĄlĂł mondatokat vagy adjon hozzĂĄ Ăşjakat, ezzel a sajĂĄt nyelvĂŠre
    is lefordĂ­thatja a mondatokat.

    * MĂłdosĂ­tsa a vĂĄlaszokat vagy fordĂ­tsa le a sajĂĄt nyelvĂŠre.


    ### HasznĂĄlat

    Minden mondatnak az alĂĄbbi szavak egyikĂŠvel kell kezdĹdnie:

    * `JĂĄtszd le`, `IndĂ­tsd el`, `Kapcsold be` (felszĂłlĂ­tĂł mĂłd, tĂĄrgyas ragozĂĄs)

    * `SzĂłljon`, `Menjen` (felszĂłlĂ­tĂł, E/3, alanyi ragozĂĄs)

    * `HallgatnĂĄm` (feltĂŠteles mĂłd, tĂĄrgyas ragozĂĄs)

    * `HallgatnĂŠk` (feltĂŠteles mĂłd, alanyi ragozĂĄs)

    * `Keverj` (keverĂŠs bekapcsolĂĄsĂĄval)

    EzutĂĄn a kĂ­vĂĄnt elem neve kĂśvetkezik, majd a mĂŠdiatĂ­pus
    (`elĹadĂłt`/`szĂĄmot`/`albumot`/`lejĂĄtszĂĄsi listĂĄt`/`rĂĄdiĂłt`).

    * album ĂŠs szĂĄm esetĂŠn opcionĂĄlisan kĂśvetheti az elĹadĂł neve ĂŠs az
    `elĹadĂłtĂłl`/`zenĂŠsztĹl`/`zenekartĂłl` kifejezĂŠs

    * ezutĂĄn opcionĂĄlisan megadhatĂł a terĂźlet vagy az eszkĂśz neve

    * elĹadĂł, szĂĄm, album ĂŠs lejĂĄtszĂĄsi lista esetĂŠn opcionĂĄlisan kĂśvetheti
    a `rĂĄdiĂł mĂłdban` kifejezĂŠs

    Ha a mondat a `Keverj` szĂłval kezdĹdik, a lejĂĄtszĂł vĂŠletlenszerĹą
    sorrendben jĂĄtssza le a szĂĄmokat, egyĂŠbkĂŠnt kikapcsolja a keverĂŠst.

    A tĂĄrgyas ragozĂĄsĂş trigger szavak (jĂĄtszd le, indĂ­tsd el, kapcsold be, hallgatnĂĄm)
    utĂĄn a mĂŠdiatĂ­pus tĂĄrgyesetben ĂĄll (albumot, szĂĄmot, elĹadĂłt), mĂ­g az alanyi
    ragozĂĄsĂşak (szĂłljon, menjen, hallgatnĂŠk) utĂĄn alanyesetben (album, szĂĄm, elĹadĂł).

    #### Elfogadott vĂĄltozatok

    a hatĂĄrozott nĂŠvelĹ (`a`, `az`) hasznĂĄlata opcionĂĄlis

    |MĂŠdiatĂ­pus|Elfogadott vĂĄltozatok|

    |---|---|

    |`elĹadĂł`|`zenĂŠsz`, `banda`, `egyĂźttes`, `zenekar`|

    |`szĂĄm`|`dal`|

    |`album`|`lemez`, `kislemez`, `nagylemez`|

    |`rĂĄdiĂł`|`rĂĄdiĂłĂĄllomĂĄs`, `rĂĄdiĂładĂł`, `ĂĄllomĂĄs`|

    |`lejĂĄtszĂĄsi lista`|`playlist`|


    #### PĂŠldĂĄk

    ```

    JĂĄtszd le a Pink Floyd elĹadĂłt a konyhĂĄban

    IndĂ­tsd el a Jagged Little Pill albumot a dolgozĂłszobĂĄban

    HallgatnĂĄm a Greatest Hits albumot a James Taylor elĹadĂłtĂłl a konyhĂĄban

    Kapcsold be a New Years Day szĂĄmot a hĂĄlĂłszobĂĄban

    JĂĄtszd le a New Years Day szĂĄmot a hĂĄlĂłszobĂĄban rĂĄdiĂł mĂłdban

    SzĂłljon az A Hard Days Night dal a Billy Joel elĹadĂłtĂłl a hĂĄlĂłszobĂĄban

    HallgatnĂŠk Classic Rock lejĂĄtszĂĄsi listĂĄt a dolgozĂłszobĂĄban

    Menjen a BBC Radio 1 rĂĄdiĂłĂĄllomĂĄs a hĂĄlĂłszobĂĄban

    IndĂ­tsd el a Classical Nights albumot a hĂĄlĂłszobai Sonos hangszĂłrĂłn

    HallgatnĂĄm a Classical Nights lemezt a hĂĄlĂłszobai Sonos hangszĂłrĂłn

    JĂĄtszd le az U2 zenekart

    SzĂłljon a Muse egyĂźttes

    Keverj Muse dalt

    Keverj Classical Nights albumot a hĂĄlĂłszobai Sonos hangszĂłrĂłn

    Kapcsold be a Roadside Picnic hangoskĂśnyvet

    ```'
  input:
    default_player_entity_id_input:
      name: AlapĂŠrtelmezett lejĂĄtszĂł
      selector:
        entity:
          filter:
          - integration: music_assistant
            domain:
            - media_player
          multiple: false
    trigger_response_settings:
      name: AktivĂĄlĂĄs ĂŠs vĂĄlaszbeĂĄllĂ­tĂĄsok az Asszisztenshez
      icon: mdi:chat
      description: 'Ezekben a beĂĄllĂ­tĂĄsokban mĂłdosĂ­thatja a meglĂŠvĹ aktivĂĄlĂł mondatokat
        vagy hozzĂĄadhat Ăşjakat. A szĂśgletes zĂĄrĂłjelek [ ] kĂśzĂŠ zĂĄrt szĂśveg opcionĂĄlis.
        A kerek zĂĄrĂłjelek ( ) ĂŠs a fĂźggĹleges vonal | segĂ­tsĂŠgĂŠvel tĂśbb ĂŠrtĂŠket adhat
        meg, amelyek ''vagy'' kapcsolatban ĂĄllnak. A { lekĂŠrdezĂŠs } egy helyettesĂ­tĹ
        ĂŠrtĂŠk, amely a kĂŠrt mĂŠdiĂĄt ĂŠs opcionĂĄlisan a terĂźletet vagy Music Assistant
        lejĂĄtszĂłt tartalmazza.

        BeĂĄllĂ­thatja az Asszisztens vĂĄlaszait is. A vĂĄlaszok jinja sablonokat hasznĂĄlnak,
        amelyekbe a mĂŠdiaadatok ĂŠs a Music Assistant lejĂĄtszĂł neve kerĂźl.'
      collapsed: true
      input:
        album_trigger:
          name: Album aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy adott album lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (jĂĄtszd le|indĂ­tsd el|kapcsold be|hallgatnĂĄm|keverj) [a |az ]{media_name}
            (albumot|lemezt|kislemezt|nagylemezt) [[a |az ]{artist} (elĹadĂłtĂłl|zenĂŠsztĹl|bandĂĄtĂłl|egyĹąttestĹl|zenekartĂłl)]
            [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}][ (rĂĄdiĂł|rĂĄdiĂł
            mĂłdban) {radio_mode}]
          - (szĂłljon|menjen|hallgatnĂŠk) [a |az ]{media_name} (album|lemez|kislemez|nagylemez)
            [[a |az ]{artist} (elĹadĂłtĂłl|zenĂŠsztĹl|bandĂĄtĂłl|egyĹąttestĹl|zenekartĂłl)]
            [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}][ (rĂĄdiĂł|rĂĄdiĂł mĂłdban)
            {radio_mode}]
        track_trigger:
          name: SzĂĄm aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy adott szĂĄm lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (jĂĄtszd le|indĂ­tsd el|kapcsold be|hallgatnĂĄm|keverj) [a |az ]{media_name}
            (szĂĄmot|dalt) [[a |az ]{artist} (elĹadĂłtĂłl|zenĂŠsztĹl|bandĂĄtĂłl|egyĹąttestĹl|zenekartĂłl)]
            [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}][ (rĂĄdiĂł|rĂĄdiĂł
            mĂłdban) {radio_mode}]
          - (szĂłljon|menjen|hallgatnĂŠk) [a |az ]{media_name} (szĂĄm|dal)
            [[a |az ]{artist} (elĹadĂłtĂłl|zenĂŠsztĹl|bandĂĄtĂłl|egyĹąttestĹl|zenekartĂłl)]
            [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}][ (rĂĄdiĂł|rĂĄdiĂł mĂłdban)
            {radio_mode}]
        artist_trigger:
          name: ElĹadĂł aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy adott elĹadĂł zenĂŠjĂŠnek lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (jĂĄtszd le|indĂ­tsd el|kapcsold be|hallgatnĂĄm|keverj) [a |az ]{media_name}
            (elĹadĂłt|zenĂŠszt|bandĂĄt|egyĂźttest|zenekart) [(a |az |ban |ben |on |Ăśn |en
            ){area_or_player_name}][ (rĂĄdiĂł|rĂĄdiĂł mĂłdban) {radio_mode}]
          - (szĂłljon|menjen|hallgatnĂŠk) [a |az ]{media_name} (elĹadĂł|zenĂŠsz|banda|egyĂźttes|zenekar)
            [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}][ (rĂĄdiĂł|rĂĄdiĂł mĂłdban)
            {radio_mode}]
        audiobook_trigger:
          name: HangoskĂśnyv aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy hangoskĂśnyv lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (jĂĄtszd le|indĂ­tsd el|kapcsold be|hallgatnĂĄm) [a |az ]{media_name}
            (hangoskĂśnyvet|kĂśnyvet) [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}]
          - (szĂłljon|menjen|hallgatnĂŠk) [a |az ]{media_name} (hangoskĂśnyv|kĂśnyv)
            [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}]
        radio_trigger:
          name: RĂĄdiĂł aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy rĂĄdiĂłĂĄllomĂĄs lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (jĂĄtszd le|indĂ­tsd el|kapcsold be|hallgatnĂĄm) [a |az ]{media_name}
            (rĂĄdiĂłĂĄllomĂĄst|rĂĄdiĂłt|rĂĄdiĂładĂłt|ĂĄllomĂĄst) [(a |az |ban |ben |on |Ăśn |en
            ){area_or_player_name}]
          - (szĂłljon|menjen|hallgatnĂŠk) [a |az ]{media_name} (rĂĄdiĂłĂĄllomĂĄs|rĂĄdiĂł|rĂĄdiĂładĂł|ĂĄllomĂĄs)
            [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}]
        playlist_trigger:
          name: LejĂĄtszĂĄsi lista aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy lejĂĄtszĂĄsi lista lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (jĂĄtszd le|indĂ­tsd el|kapcsold be|hallgatnĂĄm|keverj) [a |az ]{media_name}
            (lejĂĄtszĂĄsi listĂĄt|playlistet) [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}][
            (rĂĄdiĂł|rĂĄdiĂł mĂłdban) {radio_mode}]
          - (szĂłljon|menjen|hallgatnĂŠk) [a |az ]{media_name} (lejĂĄtszĂĄsi lista|playlist)
            [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}][ (rĂĄdiĂł|rĂĄdiĂł mĂłdban)
            {radio_mode}]
        response_input:
          name: VĂĄlasz az AsszisztenstĹl
          description: Az Asszisztens ĂĄltal adott vĂĄlasz.
          selector:
            text:
              multiline: false
              multiple: false
          default: '{{ ''Keverem'' if ''keverj'' in trigger.sentence | lower else
            ''LejĂĄtszom''}} â {{ trigger.slots.media_name }} â {{ mass_player_name
            }}'
triggers:
- trigger: conversation
  command: !input album_trigger
  id: album
- trigger: conversation
  command: !input track_trigger
  id: track
- trigger: conversation
  command: !input artist_trigger
  id: artist
- trigger: conversation
  command: !input audiobook_trigger
  id: audiobook
- trigger: conversation
  command: !input radio_trigger
  id: radio
- trigger: conversation
  command: !input playlist_trigger
  id: playlist
actions:
- alias: VĂĄltozĂłk definiĂĄlĂĄsa az automatizĂĄciĂłhoz
  variables:
    version: 20250404
    shuffle: '{{ ''keverj'' in trigger.sentence | lower }}'
    default_player_entity_id: !input default_player_entity_id_input
    trigger_id: '{{ trigger.id }}'
    area_or_player_name: '{{ trigger.slots.area_or_player_name | default }}'
    assist_device_id: '{{ trigger.device_id }}'
    action_data:
      media_id: '{{ trigger.slots.media_name }}'
      media_type: '{{ ''radio'' if ''rĂĄdiĂł'' in media_name | lower else trigger_id
        }}'
      artist: '{{ trigger.slots.artist | default }}'
      radio_mode: '{{ ''rĂĄdiĂł'' in trigger.slots.radio_mode | default | lower }}'
    ma_players: '{{  integration_entities(''music_assistant'') | select(''match'', ''media_player'') | list }}'
    player_entity_id_by_player_name: "{{ ma_players |
      expand \n  | selectattr('name', 'match', area_or_player_name, ignorecase=true)\n
      \ | map(attribute='entity_id') | list }}\n"
    player_entity_id_by_area_name: '{{ areas() | map(''area_name'') | select(''match'',
      area_or_player_name,  ignorecase=true) | map(''area_entities'') | sum(start=[])
      | select(''in'',  ma_players) | list }}

      '
    player_entity_id_by_assist_area: '{{ area_entities(area_id(trigger.device_id))
      | select(''in'', ma_players) | list }}

      '
    mass_player_entity_id: "{{ player_entity_id_by_player_name or player_entity_id_by_area_name
      \nor player_entity_id_by_assist_area or [default_player_entity_id] }}\n"
    mass_player_name: '{{ mass_player_entity_id | map(''state_attr'', ''friendly_name'')
      | join('', '') }}'
- alias: MĂŠdia kĂźldĂŠse a kivĂĄlasztott Music Assistant lejĂĄtszĂłnak
  action: music_assistant.play_media
  data: '{{ dict(action_data.items() | selectattr(''1'')) }}'
  target:
    entity_id: '{{ mass_player_entity_id }}'
- alias: KeverĂŠs be/kikapcsolĂĄsa a Music Assistant lejĂĄtszĂłn
  action: media_player.shuffle_set
  data:
    shuffle: '{{ shuffle }}'
  target:
    entity_id: '{{ mass_player_entity_id }}'
- alias: VĂĄlasz visszakĂźldĂŠse
  set_conversation_response: !input response_input
mode: single
